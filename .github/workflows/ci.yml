name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: merchshop
          POSTGRES_PASSWORD: merchshop
          POSTGRES_DB: merchshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U merchshop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://merchshop:merchshop@localhost:5432/merchshop_test?schema=public
      NEXTAUTH_SECRET: ci-secret
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma migrate deploy

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test --coverage

      - run: pnpm build
