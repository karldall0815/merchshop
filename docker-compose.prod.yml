# Produktives Deployment.
# Erwartet eine vollständig gepflegte .env-Datei.

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-merchshop/merchshop}:${APP_TAG:-latest}
    container_name: merchshop-app
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    container_name: merchshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-merchshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:-merchshop}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-merchshop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: merchshop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?s3 access key required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?s3 secret key required}
      # The base image presets MINIO_ROOT_*_FILE pointing at "access_key" /
      # "secret_key" paths that don't exist here. Setting them to empty
      # strings makes MinIO fall back to the *_USER / *_PASSWORD vars above,
      # otherwise the signature check fails because MinIO uses different
      # credentials than we hand the app.
      MINIO_ROOT_USER_FILE: ""
      MINIO_ROOT_PASSWORD_FILE: ""
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot bucket initialization. Creates the merchshop-images bucket on
  # first boot, then exits. Without this, the wizard's S3 test fails with
  # NoSuchBucket on a fresh install.
  minio-init:
    image: minio/mc:latest
    container_name: merchshop-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb --ignore-existing local/merchshop-images &&
      echo 'bucket ready' &&
      exit 0
      "
    restart: "no"

  low-stock-cron:
    image: alpine:3.20
    container_name: merchshop-low-stock-cron
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    environment:
      JOBS_TOKEN: ${JOBS_TOKEN:?cron requires JOBS_TOKEN}
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache curl &&
      while true; do
        sleep 43200 &&
        curl -fsS \"http://app:3000/api/jobs/low-stock?token=$$JOBS_TOKEN\" || true;
      done
      "

volumes:
  postgres-data:
  minio-data:
