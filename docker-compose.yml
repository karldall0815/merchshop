# Lokales Entwicklungs-Setup: nur Infrastruktur.
# Die Next.js-App läuft in der Regel direkt via `pnpm dev` außerhalb von Docker.
# Für Produktiv-Deployment siehe docker-compose.prod.yml.

services:
  postgres:
    image: postgres:16-alpine
    container_name: merchshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: merchshop
      POSTGRES_PASSWORD: merchshop
      POSTGRES_DB: merchshop
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merchshop"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: merchshop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web-Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Bucket-Init (legt initialen Bucket an)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/merchshop-images;
      mc anonymous set download local/merchshop-images;
      exit 0;
      "

  # Optional: lokales Mail-Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: merchshop-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web-UI

volumes:
  postgres-data:
  minio-data:
